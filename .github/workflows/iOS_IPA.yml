name: iOS IPA Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  iOS-ipa-build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Flutter pub get
        run: flutter pub get

      - name: Fix iOS bundle ID and remove signing
        run: |
          cd ios
          # Supprimer les références au Development Team
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = [^;]*;//g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' Runner.xcodeproj/project.pbxproj

      - name: Pod install
        run: pod install
        working-directory: ios

      - name: Flutter build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=FLUTTER_WEB_USE_SKIA=true

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ENT.ipa Payload
          echo "✅ IPA créé : $(du -sh ENT.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ENT-IPA
          path: ENT.ipa
          retention-days: 30
