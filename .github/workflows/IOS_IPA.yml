name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: pod install
        working-directory: ios

      - name: Disable code signing via xcconfig
        run: |
          echo 'CODE_SIGNING_ALLOWED=NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGNING_REQUIRED=NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGN_IDENTITY=' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGNING_ALLOWED=NO' >> ios/Flutter/Debug.xcconfig
          echo 'CODE_SIGNING_REQUIRED=NO' >> ios/Flutter/Debug.xcconfig
          echo 'CODE_SIGN_IDENTITY=' >> ios/Flutter/Debug.xcconfig

      - name: Build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ENT.ipa Payload/
          echo "✅ IPA: $(du -sh ENT.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ENT-IPA
          path: build/ios/iphoneos/ENT.ipa
          retention-days: 30
