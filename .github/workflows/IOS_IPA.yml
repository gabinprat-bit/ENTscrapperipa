name: iOS IPA Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  iOS-ipa-build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: pod install
        working-directory: ios

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 \
            --build-number=1

      - name: Build IPA manually
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../ENT.ipa Payload/
          cd ../../..
          echo "✅ IPA size: $(du -sh ENT.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ENT-IPA
          path: ENT.ipa
          retention-days: 30
