workflows:
  ios-release-no-shorebird:
    name: iOS release (No Shorebird)
    environnement:
      flutter: stable
      xcode: latest
    scripts:
       - flutter build ios --simulator
       - mkdir -p build/ios/ipa
       - zip -r build/ios/ipa/Runner.app zip build/ios/iphonessimulator/Runner.app
    artifacts:
       - build/ios/ipa/Runner.app.zip
